name: Build DaKoNe eBike Pro v0.1

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android packages
        run: |
          sdkmanager "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Create source project
        run: |
          rm -rf ebikepro_v01 app build.gradle settings.gradle
          cat > dakone-ebike-pro-v01-source.tar.gz.b64 <<'B64'
          
          B64
          base64 -d dakone-ebike-pro-v01-source.tar.gz.b64 > dakone-ebike-pro-v01-source.tar.gz
          tar -xzf dakone-ebike-pro-v01-source.tar.gz
          cp -R ebikepro_v01/* .

      - name: Build APK and AAB
        run: |
          gradle --no-daemon clean assembleDebug bundleRelease
          mkdir -p output
          cp app/build/outputs/apk/debug/app-debug.apk output/DaKoNe-eBike-Pro-v01-debug.apk
          cp app/build/outputs/bundle/release/app-release.aab output/DaKoNe-eBike-Pro-v01-release.aab

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: DaKoNe-eBike-Pro-v01-test
          path: output/*
