      - name: Build APK and AAB
        run: |
          cd ebikepro_v05
          gradle clean assembleDebug bundleRelease --no-daemon
          cd ..
          mkdir -p output
          cp ebikepro_v05/app/build/outputs/apk/debug/app-debug.apk output/DaKoNe-eBike-Pro-v05-tabs-ui-debug.apk
          cp ebikepro_v05/app/build/outputs/bundle/release/app-release.aab output/DaKoNe-eBike-Pro-v05-tabs-ui-release.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DaKoNe-eBike-Pro-v05-tabs-ui-test
          path: "output"
          if-no-files-found: error
