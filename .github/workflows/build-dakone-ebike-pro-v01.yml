      - name: Build APK and AAB
        run: |
          cd ebikepro_v06
          gradle clean assembleDebug bundleRelease --no-daemon
          cd ..
          mkdir -p output
          cp ebikepro_v06/app/build/outputs/apk/debug/app-debug.apk output/DaKoNe-eBike-Pro-v06-accessory-pure-debug.apk
          cp ebikepro_v06/app/build/outputs/bundle/release/app-release.aab output/DaKoNe-eBike-Pro-v06-accessory-pure-release.aab

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: DaKoNe-eBike-Pro-v06-accessory-pure-test
          path: "output"
          if-no-files-found: error
